[build]
  publish = "public"
  functions = "netlify/functions"
  command = "npm install"

[functions]
  node_bundler = "esbuild"

# All dynamic routes go to the Express function — original path is preserved
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200
  force = true

[[redirects]]
  from = "/auth/*"
  to = "/.netlify/functions/api"
  status = 200
  force = true

[[redirects]]
  from = "/admin"
  to = "/.netlify/functions/api"
  status = 200
  force = true

[[redirects]]
  from = "/share/*"
  to = "/.netlify/functions/api"
  status = 200
  force = true

[[redirects]]
  from = "/js/config.js"
  to = "/.netlify/functions/api"
  status = 200
  force = true

# Page routes → HTML files
