# Netlify configuration for StreamInk Studio
# Architecture: Netlify (frontend CDN) + Render.com (Express API backend)
#
# How it works:
#  - Netlify serves all HTML/CSS/JS from /public as a static site (fast, global CDN)
#  - All /api/* and server-side requests are proxied to your Render backend
#  - Set RENDER_BACKEND_URL in Netlify environment variables (Site settings → Env vars)

[build]
  publish = "public"
  # No build command needed — pure static files

[build.environment]
  NODE_VERSION = "20"

# ── Proxy all API calls to Render backend ──────────────────────────────────
# Replace https://streamink.onrender.com with your actual Render URL

[[redirects]]
  from   = "/api/*"
  to     = "https://streamink.onrender.com/api/:splat"
  status = 200
  force  = true
  [redirects.headers]
    X-Forwarded-Host = ":netlify"

[[redirects]]
  from   = "/auth/*"
  to     = "https://streamink.onrender.com/auth/:splat"
  status = 200
  force  = true

